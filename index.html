<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Energy</title>
    <style>
        body { background: #050505; color: #fff; font-family: Arial, sans-serif; margin: 0; padding-bottom: 60px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #333; }
        .cart-btn { background: #ff0000; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .card img { width: 100%; height: 120px; object-fit: contain; border-radius: 8px; display: block; }
        .price { color: #ff0000; font-weight: bold; margin: 8px 0; }
        button { width: 100%; background: #ff0000; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .modal { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 85%; background: #111; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 100; border-top: 2px solid #ff0000; }
        .success-modal { text-align: center; padding-top: 50px; }
        .circle { width: 80px; height: 80px; background: #27ae60; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; }
        #cartItems { margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<header>
    <h2>ENERGY STORE</h2>
    <div class="cart-btn" onclick="openCart()">🛒 <span id="cart-count">0</span></div>
</header>

<div class="grid" id="productGrid"></div>

<div id="cartModal" class="modal">
    <span onclick="closeModal('cartModal')" style="float:right; font-size: 28px; cursor: pointer;">✕</span>
    <h3>Ваша корзина</h3>
    <div id="cartItems"></div>
    <button id="orderBtn" onclick="showSuccess()">ОФОРМИТЬ ЗАКАЗ</button>
</div>

<div id="successModal" class="modal success-modal">
    <div class="circle">✓</div>
    <h3>Спасибо за заказ!</h3>
    <p>Позвоните по номеру:<br><b style="font-size: 1.4em; color: #ff0000;">+7-962-527-05-95</b></p>
    <p>И продиктуйте ваш заказ</p>
    <button onclick="resetApp()">НА ГЛАВНУЮ</button>
</div>

<script>
    const products = [
        {name: "Adren Mix", img: "adren_mix.jpg", price: 150},
        {name: "Adren Original", img: "adren_original.jpg", price: 150},
        {name: "Adren Zero", img: "adren_zero.jpg", price: 150},
        {name: "Burn Apple Kiwi", img: "burn_apple_kiwi.jpg", price: 130},
        {name: "Burn Cherry", img: "burn_cherry.jpg", price: 130},
        {name: "Burn Citrus", img: "burn_citrus.jpg", price: 130},
        {name: "Burn Original", img: "burn_original.jpg", price: 130},
        {name: "Burn Peach", img: "burn_peach.jpg", price: 130},
        {name: "Burn Tropical", img: "burn_tropical.jpg", price: 130},
        {name: "Flash Berry", img: "flash_berry.jpg", price: 90},
        {name: "Flash Donut", img: "flash_donut.jpg", price: 90},
        {name: "Flash Game", img: "flash_game.jpg", price: 90},
        {name: "Flash Kiwi", img: "flash_kiwi.jpg", price: 90},
        {name: "Flash Lime", img: "flash_lime.jpg", price: 90},
        {name: "Flash Orange", img: "flash_orange.jpg", price: 90},
        {name: "Flash Original", img: "flash_original.jpg", price: 90},
        {name: "Flash Ultra", img: "flash_ultra.jpg", price: 90},
        {name: "Flash Zero", img: "flash_zero.jpg", price: 90},
        {name: "Raush", img: "raush.jpg", price: 100}
    ];

    let cart = [];
    const grid = document.getElementById('productGrid');// Отрисовка товаров
    products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = 
            <img src="images/${p.img}" alt="${p.name}" onerror="this.style.display='none'">
            <p>${p.name}</p>
            <p class="price">${p.price} руб</p>
        ;
        const btn = document.createElement('button');
        btn.innerText = 'Купить';
        btn.onclick = () => addToCart(p.name, p.price);
        card.appendChild(btn);
        grid.appendChild(card);
    });

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
    }

    function openCart() {
        const container = document.getElementById('cartItems');
        if (cart.length === 0) {
            container.innerHTML = "<p>Корзина пуста</p>";
            document.getElementById('orderBtn').style.display = 'none';
        } else {
            container.innerHTML = cart.map(item => 
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>${item.price} руб</span>
                </div>
            ).join('');
            document.getElementById('orderBtn').style.display = 'block';
        }
        document.getElementById('cartModal').style.display = 'block';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function showSuccess() {
        closeModal('cartModal');
        document.getElementById('successModal').style.display = 'block';
    }

    function resetApp() {
        cart = [];
        document.getElementById('cart-count').innerText = '0';
        closeModal('successModal');
    }
</script>

</body>
</html>
